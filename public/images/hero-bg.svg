<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#072a42"/>
      <stop offset="50%" style="stop-color:#0B3C5D"/>
      <stop offset="100%" style="stop-color:#17384D"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(201,168,76,0.06)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <circle cx="300" cy="400" r="200" fill="rgba(201,168,76,0.03)"/>
  <circle cx="1600" cy="700" r="300" fill="rgba(201,168,76,0.02)"/>
  <!-- Scale of justice -->
  <g transform="translate(1500,200)" opacity="0.06" fill="none" stroke="#C9A84C" stroke-width="3">
    <line x1="0" y1="0" x2="0" y2="200"/>
    <line x1="-80" y1="40" x2="80" y2="40"/>
    <circle cx="-80" cy="120" r="40"/>
    <circle cx="80" cy="100" r="40"/>
    <rect x="-20" y="200" width="40" height="15" rx="5"/>
  </g>
</svg>